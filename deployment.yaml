apiVersion: apps/v1
kind: Deployment
metadata:
  name: contact-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: contact-service
  template:
    metadata:
      labels:
        app: contact-service
    spec:
      containers:
        - name: contact-service
          image: contact-service:latest
          ports:
            - containerPort: 8087
apiVersion: v1
kind: Service
metadata:
  name: contact-service
spec:
  type: NodePort
  selector:
    app: contact-service
  ports:
    - port: 8087
      targetPort: 8087
      nodePort: 30001

